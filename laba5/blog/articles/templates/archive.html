<!DOCTYPE html>
{% load static %}
<html>
<head>
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{% static 'css/archive.css' %}" />
</head>
<body>
    <div class="main">
        
        <div class="header">
            <div class="logo-box">Django public blog</div>
        </div>

        <div class="archive">
            {% for post in posts %}
                <div class="one-post">
                    <h2 class="post-title">
                        <a href="{% url 'get_article' post.pk %}">{{ post.title }}</a>
                    </h2>
                    
                    <div class="article-info">
                        <div class="article-author">{{ post.author.username }}</div>
                        <div class="article-createddate">{{ post.created_date }}</div>
                    </div>
                    
                    <p class="article-text">{{ post.get_excerpt }}</p>
                </div>
            {% endfor %}
        </div>

    </div>
</body>
</html>
